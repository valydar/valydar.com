<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valydar — Identity Verification Platform</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#6366f1;--bg:#0a0a0f;--text:#e4e4ed;--muted:#8888a0;--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
  body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .logo{font-size:48px;font-weight:800;margin-bottom:8px;letter-spacing:-1px}
  .logo span{color:var(--accent)}
  h1{font-size:clamp(28px,5vw,48px);font-weight:700;margin-bottom:16px;line-height:1.2}
  p{color:var(--muted);font-size:clamp(16px,2vw,18px);max-width:500px;margin-bottom:32px;line-height:1.6}
  .status{display:inline-block;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.3);color:var(--accent);padding:8px 20px;border-radius:999px;font-size:14px;font-weight:600;margin-bottom:32px}
  .links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
  .links a{color:var(--muted);text-decoration:none;font-size:14px;transition:color .2s;padding:8px 16px;border:1px solid #2a2a3a;border-radius:8px}
  .links a:hover{color:var(--text);border-color:var(--accent)}
  .badge{margin-top:48px;color:var(--muted);font-size:12px;opacity:.6}
</style>
</head>
<body>
  <div class="logo"><span>◆</span> valydar</div>
  <div class="status">Coming Soon</div>
  <h1>Identity Verification<br>for Developers</h1>
  <p>Single API for document verification, biometrics, KYC, AML, and fraud detection. Built for developers. Priced by usage.</p>
  <div class="links">
    <a href="https://docs.dev.valydar.com">Documentation</a>
    <a href="https://portal.dev.valydar.com">Sandbox</a>
    <a href="https://api.dev.valydar.com/health">API Status</a>
  </div>
  <div class="badge">Valydar Software B.V. — Amsterdam</div>
</body>
</html>
